# fly.toml app configuration file generated for diamonds-annotation on 2026-05-10T14:38:58-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'diamonds-annotation'
primary_region = 'iad'

[build]

[env]
  DATA_DIR = '/data'
  HOST = '0.0.0.0'
  PORT = '8080'

[[mounts]]
  source = 'diamonds_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
